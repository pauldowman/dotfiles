# Set the default terminal type for proper key handling
set -g default-terminal "tmux-256color"

# Enable focus events so Neovim can auto-reload files
set -g focus-events on

# Fix forward delete key (fn-delete on macOS) for Ghostty
set -as terminal-features ",xterm*:clipboard:ccolour:cstyle:focus:title:RGB"
set -as terminal-features ",tmux*:clipboard:ccolour:cstyle:focus:title:RGB"

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# Fix shift-enter
bind-key -T root S-Enter send-keys Escape "[13;2u"


set -g mouse on
set -g status-left-length 60
set -g status-left "[#S] #[default] "

# Allow escape sequences to pass through to the host terminal (e.g. for OSC notifications)
set -g allow-passthrough on

# Pass COLORTERM from SSH client into sessions so apps know truecolor is available
set -ag update-environment "COLORTERM"

# Join pane - prompts for which window to join to
bind-key @ command-prompt -p "Join pane from window:" "join-pane -s :'%%'"

