model = "gpt-5.6-sol"
notify = ["~/.codex/hooks/notify.sh", "Codex"]
trust_level = "trusted"
personality = "pragmatic"
sandbox_mode = "danger-full-access"
approval_policy = "never"
network_access = "enabled"
model_reasoning_effort = "xhigh"

[notice]
hide_rate_limit_model_nudge = true

[tui]
status_line = [
  "current-dir",
  "model-with-reasoning",
  "context-remaining",
  "five-hour-limit",
  "weekly-limit",
  "used-tokens",
]

[tui.model_availability_nux]
"gpt-5.5" = 4
"gpt-5.6-sol" = 4

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"

[projects."/home/paul/code/libresafe"]
trust_level = "trusted"

[projects."/home/paul/code/dev-container"]
trust_level = "trusted"
